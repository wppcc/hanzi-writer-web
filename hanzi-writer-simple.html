<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>汉字笔画动画</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.0/dist/hanzi-writer.min.js"></script>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px;
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 24px 20px 20px;
            width: 100%;
            max-width: 380px;
        }

        .header {
            text-align: center;
            margin-bottom: 18px;
        }

        .char-display {
            font-size: 56px;
            font-weight: bold;
            color: #2196F3;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
        }

        /* 画布容器，相对定位，用于放 loading 遮罩 */
        .writer-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 320px;
            margin: 0 auto 18px;
            border: 1.5px solid #e8e8e8;
            border-radius: 12px;
            overflow: hidden;
            background: #fafafa;
        }

        #hanzi-writer {
            width: 100%;
            height: 100%;
        }

        /* loading 遮罩 —— 绝对定位覆盖在画布上方 */
        #loading-mask {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            z-index: 10;
            transition: opacity 0.3s;
        }

        #loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e8e8e8;
            border-top-color: #2196F3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { font-size: 13px; color: #bbb; }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn {
            flex: 1;
            padding: 11px 4px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
        }

        .btn:active { transform: scale(0.96); opacity: 0.85; }
        .btn-primary   { background: #2196F3; }
        .btn-secondary { background: #4CAF50; }
        .btn-warning   { background: #FF9800; }

        .back-btn {
            width: 100%;
            padding: 10px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
            background: white;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .back-btn:active { background: #f5f5f5; }

        .status {
            text-align: center;
            font-size: 12px;
            color: #bbb;
            min-height: 18px;
        }

        .error-box {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            color: #e53935;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="char-display" id="char-display">…</div>
        <div class="subtitle">汉字笔画顺序动画</div>
    </div>

    <div class="writer-wrap">
        <div id="loading-mask">
            <div class="spinner"></div>
            <div class="loading-text">正在加载汉字数据…</div>
        </div>
        <div id="hanzi-writer"></div>
    </div>

    <div id="error-box" class="error-box" style="display:none;"></div>

    <div class="controls">
        <button class="btn btn-primary"   onclick="animateCharacter()">播放动画</button>
        <button class="btn btn-secondary" onclick="loopAnimation()">循环播放</button>
        <button class="btn btn-warning"   onclick="startQuiz()">书写练习</button>
    </div>

    <button class="back-btn" onclick="goBack()">← 返回</button>

    <div class="status" id="status">准备就绪</div>
</div>

<script>
    function getQueryParam(name) {
        return new URLSearchParams(window.location.search).get(name) || '你';
    }

    function updateStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    function hideLoading() {
        document.getElementById('loading-mask').classList.add('hidden');
    }

    function showError(msg) {
        const el = document.getElementById('error-box');
        el.textContent = msg;
        el.style.display = 'block';
        hideLoading();
    }

    function goBack() {
        if (typeof wx !== 'undefined' && wx.miniProgram) {
            wx.miniProgram.navigateBack();
        } else {
            history.back();
        }
    }

    const character = getQueryParam('char');
    document.getElementById('char-display').textContent = character;

    let writer = null;
    let isAnimating = false;

    window.onload = function () {
        if (typeof HanziWriter === 'undefined') {
            showError('HanziWriter 库加载失败，请检查网络后刷新');
            return;
        }

        // 用实际渲染宽度初始化，保证画布填满容器
        const size = document.getElementById('hanzi-writer').offsetWidth || 300;

        writer = HanziWriter.create('hanzi-writer', character, {
            width: size,
            height: size,
            padding: Math.round(size * 0.07),
            strokeAnimationSpeed: 1,
            delayBetweenStrokes: 100,
            strokeColor: '#333',
            outlineColor: '#ddd',
            showOutline: true,
            highlightColor: '#2196F3',
            onLoadCharDataSuccess: function () {
                hideLoading();          // ← 数据到了才隐藏 loading
                updateStatus('加载完成');
                setTimeout(animateCharacter, 400);
            },
            onLoadCharDataError: function () {
                showError('无法加载"' + character + '"的笔画数据，该字符暂不支持');
            }
        });
    };

    function animateCharacter() {
        if (!writer || isAnimating) return;
        isAnimating = true;
        updateStatus('播放笔画动画…');
        writer.animateCharacter({
            onComplete: function () {
                isAnimating = false;
                updateStatus('播放完成');
            }
        });
    }

    function loopAnimation() {
        if (!writer) return;
        isAnimating = false;
        updateStatus('循环播放中…');
        writer.loopCharacterAnimation();
    }

    function startQuiz() {
        if (!writer) return;
        isAnimating = false;
        updateStatus('请按笔画顺序书写');
        writer.quiz({
            showHintAfterMisses: 2,
            highlightOnComplete: true,
            onMistake: function ()        { updateStatus('笔画不对，再试试 ✗'); },
            onCorrectStroke: function ()  { updateStatus('正确！继续下一笔 ✓'); },
            onComplete: function (s) {
                updateStatus('练习完成');
                alert(s.totalMistakes === 0
                    ? '🎉 太棒了！全部写对了！'
                    : '✍️ 练习完成，错误 ' + s.totalMistakes + ' 次，继续加油！');
            }
        });
    }
</script>
</body>
</html>
